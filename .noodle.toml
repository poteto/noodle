# Autonomy controls human oversight in the loop.
# "full" = auto-merge on success, no human in the loop
# "review" = quality review runs, auto-merge on APPROVE
# "approve" = quality review runs, human must confirm merge
autonomy = "review"

[phases]
oops = "oops"
debugging = "debugging"

[prioritize]
skill = "prioritize"
# "after-each" | "after-n" | "manual"
run = "after-each"
model = "claude-sonnet"

[routing.defaults]
provider = "claude"
model = "claude-opus-4-6"

# Tag-specific routing overrides. Example:
# [routing.tags.urgent]
# provider = "claude"
# model = "claude-opus-4-6"

[skills]
paths = [".agents/skills"]

[agents.claude]
path = "/Users/lauren/code/noodle/.claude"
args = ["--dangerously-skip-permissions", "--verbose"]

[agents.codex]
path = "/Users/lauren/code/noodle/.codex"

[adapters.backlog]
skill = "todo"

[adapters.backlog.scripts]
sync = "go run .noodle/adapters/main.go backlog-sync"
add = "go run .noodle/adapters/main.go backlog-add"
done = "go run .noodle/adapters/main.go backlog-done"
edit = "go run .noodle/adapters/main.go backlog-edit"

[concurrency]
max_cooks = 1

[recovery]
max_retries = 3
retry_suffix_pattern = "-recover-%d"

[monitor]
stuck_threshold = "120s"
ticket_stale = "30m"
poll_interval = "5s"

[runtime]
# "tmux" | "sprites" | "cursor"
default = "tmux"

[runtime.sprites]
# token_env = "SPRITES_TOKEN"
# base_url = ""
sprite_name = "noodle-dev"
# git_token_env = "GITHUB_TOKEN"

# [runtime.cursor]
# api_key_env = "CURSOR_API_KEY"
# base_url = ""
# repository = ""

[plans]
# "keep" | "remove"
on_done = "keep"
