# Autonomy controls human oversight in the loop.
# "auto" = auto-merge on success, per-skill permissions.merge respected
# "approve" = human must confirm every merge
autonomy = "approve"

[schedule]
# "after-each" | "after-n" | "manual"
run = "after-each"
model = "claude-opus-4-6"

[routing.defaults]
provider = "claude"
model = "claude-opus-4-6"

# Tag-specific routing overrides. Example:
# [routing.tags.urgent]
# provider = "claude"
# model = "claude-opus-4-6"

[skills]
paths = [".agents/skills"]

[agents.claude]
path = "~/.claude"
args = ["--dangerously-skip-permissions", "--verbose"]

[agents.codex]
path = "~/.codex"

[adapters.backlog]
skill = "todo"

[adapters.backlog.scripts]
sync = "go run adapters/main.go backlog-sync"
add = "go run adapters/main.go backlog-add"
done = "go run adapters/main.go backlog-done"
edit = "go run adapters/main.go backlog-edit"

[monitor]
stuck_threshold = "120s"
ticket_stale = "30m"
poll_interval = "5s"

[runtime]
# "process" | "sprites"
default = "process"

[runtime.sprites]
# token_env = "SPRITES_TOKEN"
# base_url = ""
sprite_name = "noodle-dev"
# git_token_env = "GITHUB_TOKEN"

