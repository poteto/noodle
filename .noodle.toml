[routing.defaults]
provider = "claude"
model = "claude-opus-4-6"

[skills]
paths = [".agents/skills"]

[agents.claude]
path = "/Users/lauren/code/noodle/.claude"
args = ["--dangerously-skip-permissions", "--verbose"]

[agents.codex]
path = "/Users/lauren/code/noodle/.codex"

[adapters.backlog]
skill = "todo"

[adapters.backlog.scripts]
sync = "go run .noodle/adapters/main.go backlog-sync"
add = "go run .noodle/adapters/main.go backlog-add"
done = "go run .noodle/adapters/main.go backlog-done"
edit = "go run .noodle/adapters/main.go backlog-edit"


[concurrency]
max_cooks = 1
