# Noodle project-level config.
# This file overrides ~/.noodle/config.toml for this repository only.

[model]
provider = "codex"
model = "gpt-5.3-codex"
reasoning_level = "high"

[domain.frontend]
provider = "claude"
model = "claude-opus-4-6"
reasoning_level = "high"

[domain.backend]
provider = "codex"
model = "gpt-5.3-codex"
reasoning_level = "high"

[task.verify]
provider = "codex"
model = "gpt-5.3-codex"
reasoning_level = "xhigh"

[task.systemfix]
provider = "codex"
model = "gpt-5.3-codex"
reasoning_level = "xhigh"

[task.quality]
provider = "codex"
model = "gpt-5.3-codex"
reasoning_level = "xhigh"
