#:schema https://json.schemastore.org/any.json

root = "."
tmp_dir = "tmp/air-noodle"

[build]
# Rebuild the noodle CLI into ./bin on source changes.
cmd = "go build -o ./bin/noodle ."
bin = "./bin/noodle"

# Run noodle start so the Go API server is live for Vite's proxy.
entrypoint = ["./bin/noodle", "start"]

include_ext = ["go", "mod", "sum"]
exclude_dir = [".git", ".worktrees", "node_modules", "dist", "target", "tmp"]
exclude_regex = ["_test\\.go"]
log = "tmp/air-noodle/build-errors.log"

stop_on_error = true
send_interrupt = true
kill_delay = "500ms"
delay = 300

[log]
silent = true
time = true

[misc]
clean_on_exit = true
