<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>noodle — agent conversations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app-layout">

  <!-- Sidebar: agent list -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark"></div>
      <span>NOODLE</span>
      <span class="header-status"><span class="status-dot active"></span> running</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/history.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="1" width="6" height="6" rx="1"/>
          <rect x="11" y="1" width="6" height="6" rx="1"/>
          <rect x="1" y="11" width="6" height="6" rx="1"/>
          <rect x="11" y="11" width="6" height="6" rx="1"/>
        </svg>
        Dashboard
      </a>
      <a href="/" class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="5" r="3"/>
          <path d="M2 16c0-3.3 3.1-6 7-6s7 2.7 7 6"/>
        </svg>
        Live Feed
      </a>
      <a href="/tree.html" class="nav-item">
        <svg class="nav-icon" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="2.5"/>
          <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.3 3.3l1.4 1.4M13.3 13.3l1.4 1.4M3.3 14.7l1.4-1.4M13.3 4.7l1.4-1.4"/>
        </svg>
        Tree
      </a>
    </nav>

    <div class="section-label">Scheduler</div>
    <ul class="agent-list" id="agent-list-manager"></ul>

    <div class="section-label">Orders <span class="section-count" id="active-count">0</span></div>
    <div class="agent-tree" id="agent-tree"></div>

    <div class="sidebar-footer">
      <span class="footer-label">Session Cost</span>
      <span class="footer-value">$1.14</span>
    </div>
  </aside>

  <!-- Main feed -->
  <main class="feed-container">
    <header class="feed-header" id="feed-header"></header>

    <div class="feed-content" id="feed-content"></div>

    <div class="scroll-fade"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="input-field" placeholder="Direct this agent..." rows="1"></textarea>
        <div class="input-footer">
          <div class="input-hint">
            <kbd>Enter</kbd> send · <kbd>Shift+Enter</kbd> newline
          </div>
          <button class="btn-submit">SEND</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Context panel -->
  <aside class="context-panel">
    <div class="context-header">System Status</div>
    <div class="context-body" id="context-body"></div>
  </aside>

</div>

<script src="script.js"></script>
</body>
</html>
