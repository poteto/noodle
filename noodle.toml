[routing.defaults]
provider = "codex"
model = "gpt-5.3-codex"

[skills]
paths = [".agents/skills", "skills"]

[agents]
claude_dir = "/Users/lauren/code/noodle/.claude"
codex_dir = "/Users/lauren/code/noodle/.codex"

[adapters.backlog]
skill = "todo"

[adapters.backlog.scripts]
sync = "go run .noodle/adapters/main.go backlog-sync"
add = "go run .noodle/adapters/main.go backlog-add"
done = "go run .noodle/adapters/main.go backlog-done"
edit = "go run .noodle/adapters/main.go backlog-edit"

[adapters.plans]
skill = "plan"

[adapters.plans.scripts]
sync = "go run .noodle/adapters/main.go plans-sync"
create = "go run .noodle/adapters/main.go plan-create"
done = "go run .noodle/adapters/main.go plan-done"
phase-add = "go run .noodle/adapters/main.go plan-phase-add"

[concurrency]
max_cooks = 1
